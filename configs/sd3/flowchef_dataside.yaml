notes: |
  Gating-matched FlowChef: same data-side window as UG-FM, isolating
  the full-backprop axis. The 16.9 pp PickScore gap (75.0% vs 91.9%)
  attributes to the Jacobian factor (I - (1-t) * d_v_theta / d_z)
  that FlowChef's gradient skipping discards.
